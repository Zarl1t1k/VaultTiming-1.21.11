name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Download gradle wrapper
        run: curl -L "https://github.com/gradle/gradle/raw/v8.8.0/gradle/wrapper/gradle-wrapper.jar" -o vault-timing-1.21.11-source/vault-timing-project/gradle/wrapper/gradle-wrapper.jar
      - name: Build
        working-directory: vault-timing-1.21.11-source/vault-timing-project
        run: chmod +x gradlew && ./gradlew build
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: vault-timing-jar
          path: vault-timing-1.21.11-source/vault-timing-project/build/libs/vault-timing-*.jar
